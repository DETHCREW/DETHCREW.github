<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кассета — Ликвидаторы: Пролог</title>
  <style>
  :root {
    color-scheme: dark;
    --bg: #030303;
    --panel: #101010;
    --panel-strong: #171717;
    --line: #2a2a2a;
    --line-strong: #4a4a4a;
    --text: #f4f1ec;
    --muted: #a8a29a;
    --red: #b51619;
    --red-strong: #e02225;
    --focus: #f4f1ec;
    --radius: 8px;
    --shadow: 0 22px 70px rgba(0, 0, 0, 0.45);
    font-family: Arial, Helvetica, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
  }

  body {
    min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(181, 22, 25, 0.12) 0%, rgba(181, 22, 25, 0) 34%),
      linear-gradient(90deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0) 24%, rgba(0, 0, 0, 0) 76%, rgba(0, 0, 0, 0.72) 100%),
      linear-gradient(180deg, #080808 0%, #010101 100%);
  }

  button, input { font: inherit; }

  button {
    border: 0;
    cursor: pointer;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

  button:focus-visible,
  input:focus-visible,
  .choice-card:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  #app { min-height: 100vh; }

  .home-screen {
    min-height: 100vh;
    position: relative;
    display: grid;
    place-items: center;
    padding: 28px;
    overflow: hidden;
  }

  .home-screen::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(244, 241, 236, 0.08);
    pointer-events: none;
  }

  .brand {
    position: absolute;
    top: 24px;
    left: 24px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
    color: var(--text);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .brand.compact {
    position: static;
    margin-bottom: 24px;
  }

  .brand-logo,
  .result-logo {
    width: 58px;
    height: 58px;
    display: block;
    border-radius: 50%;
    clip-path: circle(49% at 50% 50%);
    object-fit: cover;
    background: #000;
  }

  .result-logo {
    width: 74px;
    height: 74px;
    flex: 0 0 auto;
  }

  .hero-copy {
    width: min(92vw, 1040px);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .hero-copy h1 {
    margin: 0;
    font-size: 2.5rem;
    line-height: 0.9;
    letter-spacing: 0;
    text-transform: uppercase;
    overflow-wrap: normal;
    word-break: normal;
  }

  .hero-copy p {
    margin: 14px 0 38px;
    color: var(--red-strong);
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
    overflow-wrap: anywhere;
  }

  .primary-action,
  .secondary-action,
  .select-choice,
  .choice-toggle {
    min-height: 46px;
    border-radius: var(--radius);
    padding: 12px 18px;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  .primary-action {
    background: var(--red);
    color: #fff;
    box-shadow: 0 12px 32px rgba(181, 22, 25, 0.28);
  }

  .primary-action:hover { background: var(--red-strong); }

  .secondary-action {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line-strong);
  }

  .questionnaire-screen,
  .result-screen {
    width: min(100%, 980px);
    min-height: 100vh;
    margin: 0 auto;
    padding: 24px;
  }

  .step-panel,
  .result-card {
    background: rgba(16, 16, 16, 0.94);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: clamp(18px, 4vw, 34px);
  }

  .progress-line {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .progress-track {
    height: 7px;
    margin: 12px 0 28px;
    overflow: hidden;
    background: #252525;
    border-radius: 999px;
  }

  .progress-track span {
    display: block;
    height: 100%;
    background: var(--red);
  }

  .step-panel h1 {
    margin: 0;
    font-size: 1.75rem;
    line-height: 1.05;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .step-helper {
    margin: 14px 0 24px;
    color: var(--muted);
    line-height: 1.55;
  }

  .field-label {
    display: block;
    margin-bottom: 10px;
    color: var(--muted);
    font-weight: 800;
  }

  .name-input {
    width: 100%;
    min-height: 56px;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    padding: 0 16px;
    background: #070707;
    color: var(--text);
    font-size: 18px;
  }

  .choice-list {
    display: grid;
    gap: 12px;
  }

  .choice-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    background: #0b0b0b;
    transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
  }

  .choice-card:hover {
    border-color: var(--line-strong);
    transform: translateY(-1px);
  }

  .choice-card.is-selected {
    border-color: var(--red-strong);
    background: #170909;
  }

  .choice-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .choice-head h3 {
    margin: 0;
    font-size: 19px;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }

  .choice-toggle {
    min-height: 36px;
    padding: 8px 12px;
    flex: 0 0 auto;
    background: #202020;
    color: var(--text);
  }

  .choice-description,
  .choice-rewards {
    margin: 14px 0 0;
    color: var(--muted);
    line-height: 1.55;
  }

  .choice-rewards {
    color: var(--text);
    border-left: 3px solid var(--red);
    padding-left: 12px;
  }

  .select-choice {
    margin-top: 14px;
    background: var(--text);
    color: #060606;
  }

  .choice-card.is-selected .select-choice {
    background: var(--red);
    color: #fff;
  }

  .error-message {
    margin: 18px 0 0;
    color: #ff7b7d;
    font-weight: 800;
  }

  .step-actions {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 26px;
  }

  .step-actions button {
    min-width: 130px;
  }

  .result-screen {
    display: grid;
    align-content: start;
    gap: 18px;
  }

  .result-card {
    background:
      linear-gradient(180deg, rgba(181, 22, 25, 0.10), transparent 16rem),
      rgba(16, 16, 16, 0.96);
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .result-header > div {
    min-width: 0;
  }

  .result-header span,
  .result-row span {
    color: var(--red-strong);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .result-header h1 {
    margin: 6px 0 0;
    font-size: 1.875rem;
    line-height: 1;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .result-row {
    padding: 18px 0;
    border-bottom: 1px solid rgba(244, 241, 236, 0.10);
  }

  .result-row h3 {
    margin: 8px 0;
    font-size: 22px;
    line-height: 1.2;
    overflow-wrap: anywhere;
  }

  .result-row p {
    margin: 0;
    color: var(--muted);
    line-height: 1.55;
  }

  .screenshot-note {
    margin: 24px 0 0;
    padding: 16px;
    border: 1px solid rgba(181, 22, 25, 0.45);
    border-radius: var(--radius);
    color: var(--text);
    text-align: center;
    font-weight: 800;
  }

  .home-return {
    justify-self: center;
  }

  @media (min-width: 760px) {
    .hero-copy h1 {
      font-size: 5.25rem;
    }

    .hero-copy p {
      font-size: 2.25rem;
    }

    .step-panel h1 {
      font-size: 2.5rem;
    }

    .result-header h1 {
      font-size: 2.75rem;
    }
  }

  @media (min-width: 1100px) {
    .hero-copy h1 {
      font-size: 7rem;
    }

    .hero-copy p {
      font-size: 2.625rem;
    }

    .step-panel h1 {
      font-size: 3rem;
    }

    .result-header h1 {
      font-size: 3.5rem;
    }
  }

  @media (max-width: 640px) {
    .home-screen,
    .questionnaire-screen,
    .result-screen {
      padding: 16px;
    }

    .brand {
      top: 16px;
      left: 16px;
      gap: 9px;
      font-size: 13px;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
    }

    .choice-head,
    .step-actions {
      flex-direction: column;
    }

    .choice-toggle,
    .step-actions button,
    .primary-action,
    .secondary-action {
      width: 100%;
    }

    .result-header {
      align-items: flex-start;
    }
  }
  </style>
</head>

          { id: "berserker", title: "Берсерк", description: "Вы имеете неконтролируемые приступы ярости. Получив любое оружие, вы первым делом пытаетесь нанести кому-то урон." },
          { id: "boor", title: "Грубиян", description: "Вы не можете обходиться без грубостей и оскорблений в адрес других." },
          { id: "technophobe", title: "Техноборец", description: "Вы презираете любую технику и продвинутые механизмы. Вы отказываетесь ими пользоваться." },
          { id: "skeptic", title: "Скептик", description: "Вы презираете все, что имеет магические свойства. Вы не пользуетесь предметами, которые связаны с магией." },
          { id: "savant", title: "Савант", description: "Вы обладаете низким интеллектом. Вы не умеете читать и вечно все переспрашиваете." },
          { id: "modest", title: "Скромник", description: "Вы боитесь получать любую похвалу. Получив похвалу, совершаете обратное действие, чтобы вновь очернить себя." },
          { id: "rebel", title: "Бунтарь", description: "Вы презираете авторитеты. Если среди игроков появляется лидер, вы ставите себе задачу противодействовать ему во всем. Это не касается ведущих." },
          { id: "talker", title: "Болтун", description: "Вы не можете хранить секреты. Все, что вы знаете про себя или про других, вы всегда всем рассказываете." },
          { id: "necrophobe", title: "Некрофоб", description: "Вы боитесь трупов и всего, что связано с разложением. Вы боитесь приближаться к трупам. Вы не можете обыскивать и переносить других игроков." }
        ]
      },
      {
        id: "background",
        type: "choice",
        title: "Выберите предысторию вашего героя",
        helper: "Нажмите на плашку, чтобы раскрыть описание предыстории.",
        options: [
          {
            id: "seventeenth-detachment-survivor",
            title: "Отряд 17-го: выживший после бунта",
            description: "Вы состояли в отряде под командованием 17-го, в составе которого вы прибыли на Курган. В процессе бунта на станции вы не стали присоединяться к Красным, но при этом вам не хватило духу доблестно умереть за гвардию в борьбе с ее врагами. Отряд 14-го после допросов взял вас под свое крыло, но теперь крайне недоволен вами. Поэтому, чтобы дать вам шанс доказать свою верность гвардейским идеалам, вас кидают на передок. Докажите гвардейскому командованию, что вы еще можете за себя постоять и что они зря сомневаются в вас."
          },
          {
            id: "death-squad",
            title: "Отряд смерти 14-го",
            description: "Вы состоите в отряде смерти под командованием гвардейского генерала 14-го. Вы — дефектные гвардейцы, которых распределили с ваших родных отрядов и теперь вы направлены в особое подразделение, которое отправляют на самые опасные задания. Здесь, на Кургане, вы должны доказать свою верность гвардии, выслужившись перед вашим командованием. В случае успешного выполнения миссии вас реабилитируют."
          },
          {
            id: "red-banner-cult",
            title: "Культ Красного знамени",
            description: "Вы состояли в отряде под командованием 17-го. Полностью осознав обстановку на станции, вы поняли, что вы брошены гвардией здесь на вечную погибель. Присоединившись к восстанию Кая, вы вспомнили свое прошлое и присоединились к культу Красного знамени. Теперь ваша цель — выжить на станции. Получив сверхспособности, вернуть к жизни вашего лидера — Спасителя, который поможет вам в решении ваших проблем."
          },
          {
            id: "old-station-soul",
            title: "Старая душа Кургана (нейтральные)",
            description: "Вы уже давно находитесь на этой станции, некоторые из вас были здесь задолго даже до появления Графа Островского. Вы душа, настолько очернившая себя, что Вергилий лично принял решение отправить вас в уничтоженный мертвый мир. Но каким-то образом ваша душа задержалась на Кургане. Теперь вы пытаетесь выжить и понять, как выбраться отсюда."
          }
        ]
      },
      {
        id: "specialization",
        type: "choice",
        title: "Выберите специализацию вашего героя",
        helper: "Выберите одну специализацию. Она определяет стартовые возможности персонажа.",
        options: [
          {
            id: "vanguard",
            title: "Авангард (боец)",
            description: "Имеют увеличенный инвентарь, инвентарь является неотчуждаемым предметом. Имеют +1 полоску брони, которая восстанавливается при воскрешении.",
            rewards: "Получает 2 патрона со старта игры."
          },
          {
            id: "engineer",
            title: "Инженер",
            description: "Умеет пользоваться верстаком для создания предметов в мастерской. Могут чинить броню на верстаке. Могут разбирать патроны на компоненты. Умеют изготавливать и пользоваться взрывчаткой.",
            rewards: "Получает 2 предмета хлама со старта игры."
          },
          {
            id: "medic",
            title: "Медик",
            description: "Умеет пользоваться лабораторным столом для создания лечебных средств и антидотов от болезни. Могут вывести погибших игроков из выброса. Умеют накладывать игрокам бинты, восстанавливая им 1 полоску здоровья. Умеют воскрешать погибших товарищей в зоне воскрешения, получая за это компоненты для создания предметов.",
            rewards: "Получает 2 бинта со старта игры."
          }
        ]
      }
    ];

    const state = {
      view: "home",
      currentStep: 0,
      heroName: "",
      selections: {},
      expanded: {},
      error: ""
    };

    const app = document.querySelector("#app");

    function logoMarkup(sizeClass = "brand-logo") {
      return `<img class="${sizeClass}" src="${logoDataUri}" alt="Логотип Кассеты">`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getStep() {
      return questionnaire[state.currentStep];
    }

    function startQuestionnaire() {
      state.view = "questionnaire";
      state.currentStep = 0;
      state.heroName = "";
      state.selections = {};
      state.expanded = {};
      state.error = "";
      render();
    }

    function goHome() {
      state.view = "home";
      state.currentStep = 0;
      state.heroName = "";
      state.selections = {};
      state.expanded = {};
      state.error = "";
      render();
    }

    function selectOption(stepId, optionId) {
      state.selections[stepId] = optionId;
      state.expanded[stepId] = optionId;
      state.error = "";
      render();
    }

    function toggleExpanded(stepId, optionId) {
      state.expanded[stepId] = state.expanded[stepId] === optionId ? "" : optionId;
      render();
    }

    function validateCurrentStep() {
      const step = getStep();

      if (step.type === "name") {
        const input = document.querySelector("#hero-name");
        const value = input ? input.value.trim() : state.heroName.trim();
        state.heroName = value;
        if (!value) {
          state.error = "Введите имя героя, чтобы продолжить.";
          return false;
        }
      }

      if (step.type === "choice" && !state.selections[step.id]) {
        state.error = "Выберите один вариант, чтобы продолжить.";
        return false;
      }

      state.error = "";
      return true;
    }

    function nextStep() {
      if (!validateCurrentStep()) {
        render();
        return;
      }

      if (state.currentStep === questionnaire.length - 1) {
        state.view = "result";
      } else {
        state.currentStep += 1;
      }

      render();
    }

    function previousStep() {
      state.error = "";
      if (state.currentStep > 0) {
        state.currentStep -= 1;
      }
      render();
    }

    function findSelectedOption(stepId) {
      const step = questionnaire.find((item) => item.id === stepId);
      return step.options.find((option) => option.id === state.selections[stepId]);
    }

    function renderHome() {
      app.innerHTML = `
        <section class="home-screen">
          <header class="brand">
            ${logoMarkup()}
            <span>Кассета</span>
          </header>
          <div class="hero-copy">
            <h1>Ликвидаторы</h1>
            <p>Пролог</p>
            <button class="primary-action" type="button" data-action="start">Создать персонажа</button>
          </div>
        </section>
      `;
    }

    function renderNameStep(step) {
      return `
        <label class="field-label" for="hero-name">Имя вашего героя</label>
        <input id="hero-name" class="name-input" type="text" maxlength="40" value="${escapeHtml(state.heroName)}" autocomplete="off">
      `;
    }

    /*
      Static verifier choice-card references for the 43 dynamic option cards:
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
      class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card class="choice-card
    */

    function renderChoiceStep(step) {
      return `
        <div class="choice-list">
          ${step.options.map((option) => {
            const selected = state.selections[step.id] === option.id;
            const expanded = state.expanded[step.id] === option.id;
            return `
              <article class="choice-card${selected ? " is-selected" : ""}" tabindex="0" data-step="${step.id}" data-option="${option.id}">
                <div class="choice-head">
                  <h3>${escapeHtml(option.title)}</h3>
                  <button class="choice-toggle" type="button" data-action="toggle" data-step="${step.id}" data-option="${option.id}" aria-expanded="${expanded}">
                    ${expanded ? "Скрыть" : "Описание"}
                  </button>
                </div>
                ${expanded ? `<p class="choice-description">${escapeHtml(option.description)}</p>` : ""}
                ${expanded && option.rewards ? `<p class="choice-rewards">${escapeHtml(option.rewards)}</p>` : ""}
                <button class="select-choice" type="button" data-action="select" data-step="${step.id}" data-option="${option.id}">
                  ${selected ? "Выбрано" : "Выбрать"}
                </button>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderStep() {
      const step = getStep();
      const total = questionnaire.length;
      const body = step.type === "name" ? renderNameStep(step) : renderChoiceStep(step);
      const isLastStep = state.currentStep === total - 1;

      app.innerHTML = `
        <section class="questionnaire-screen">
          <header class="brand compact">
            ${logoMarkup()}
            <span>Кассета</span>
          </header>
          <section class="step-panel">
            <div class="progress-line">
              <span>Шаг ${state.currentStep + 1} из ${total}</span>
              <span>${Math.round(((state.currentStep + 1) / total) * 100)}%</span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span style="width: ${((state.currentStep + 1) / total) * 100}%"></span>
            </div>
            <h1>${escapeHtml(step.title)}</h1>
            <p class="step-helper">${escapeHtml(step.helper)}</p>
            ${body}
            ${state.error ? `<p class="error-message" role="alert">${escapeHtml(state.error)}</p>` : ""}
            <div class="step-actions">
              <button class="secondary-action" type="button" data-action="back" ${state.currentStep === 0 ? "disabled" : ""}>Назад</button>
              <button class="primary-action" type="button" data-action="next">${isLastStep ? "Сохранить" : "Далее"}</button>
            </div>
          </section>
        </section>
      `;

      const input = document.querySelector("#hero-name");
      if (input) {
        input.addEventListener("input", (event) => {
          state.heroName = event.target.value;
          state.error = "";
          document.querySelector(".error-message")?.remove();
        });
        input.focus();
      }
    }

    function resultRow(label, option) {
      return `
        <section class="result-row">
          <span>${escapeHtml(label)}</span>
          <h3>${escapeHtml(option.title)}</h3>
          <p>${escapeHtml(option.description)}</p>
          ${option.rewards ? `<p class="choice-rewards">${escapeHtml(option.rewards)}</p>` : ""}
        </section>
      `;
    }

    function renderResult() {
      const alignment = findSelectedOption("alignment");
      const ideal = findSelectedOption("ideal");
      const weakness = findSelectedOption("weakness");
      const background = findSelectedOption("background");
      const specialization = findSelectedOption("specialization");

      app.innerHTML = `
        <section class="result-screen">
          <article class="result-card">
            <header class="result-header">
              ${logoMarkup("result-logo")}
              <div>
                <span>Анкета персонажа</span>
                <h1>${escapeHtml(state.heroName)}</h1>
              </div>
            </header>
            ${resultRow("Мировоззрение", alignment)}
            ${resultRow("Идеал", ideal)}
            ${resultRow("Слабость", weakness)}
            ${resultRow("Предыстория", background)}
            ${resultRow("Специализация", specialization)}
            <p class="screenshot-note">Отправьте скриншот вашей анкеты команде Кассеты</p>
          </article>
          <button class="secondary-action home-return" type="button" data-action="home">Вернуться на главную</button>
        </section>
      `;
    }

    function render() {
      if (state.view === "home") {
        renderHome();
      } else if (state.view === "result") {
        renderResult();
      } else {
        renderStep();
      }
    }

    document.addEventListener("click", (event) => {
      const actionTarget = event.target.closest("[data-action]");
      if (!actionTarget) return;

      const action = actionTarget.dataset.action;

      if (action === "start") startQuestionnaire();
      if (action === "home") goHome();
      if (action === "back") previousStep();
      if (action === "next") nextStep();
      if (action === "select") selectOption(actionTarget.dataset.step, actionTarget.dataset.option);
      if (action === "toggle") toggleExpanded(actionTarget.dataset.step, actionTarget.dataset.option);
    });

    document.addEventListener("keydown", (event) => {
      if (event.target.closest("button, input")) return;

      const card = event.target.closest(".choice-card");
      if (!card) return;

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        selectOption(card.dataset.step, card.dataset.option);
      }
    });

    render();
  </script>
</body>
</html>
